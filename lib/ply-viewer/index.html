<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PLY Viewer</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #111218;
        --panel: rgba(24, 25, 31, 0.9);
        --panel-border: rgba(255, 255, 255, 0.14);
        --text: #f4f1e8;
        --muted: #b9bdc7;
        --accent: #83d3c5;
        --warn: #f2b84b;
        --sidebar-width: 280px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      #viewer {
        display: block;
        width: 100vw;
        height: 100vh;
      }

      .topbar,
      .timeline,
      .preview,
      .ply-panel {
        position: fixed;
        z-index: 2;
        border: 1px solid var(--panel-border);
        border-radius: 8px;
        background: var(--panel);
        backdrop-filter: blur(12px);
      }

      .topbar {
        top: 12px;
        left: 12px;
        right: 12px;
        display: flex;
        align-items: center;
        gap: 10px;
        min-height: 44px;
        padding: 8px 10px;
      }

      body.multi-mode .topbar,
      body.multi-mode .timeline,
      body.folder-mode .topbar,
      body.folder-mode .timeline {
        left: calc(var(--sidebar-width) + 24px);
      }

      .file {
        min-width: 0;
        flex: 1 1 auto;
      }

      .name {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 14px;
        line-height: 18px;
        font-weight: 650;
      }

      .status {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--muted);
        font-size: 12px;
        line-height: 16px;
      }

      .controls,
      .sequence-buttons {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .point-control,
      .toggle-control,
      .fps-control {
        display: flex;
        align-items: center;
        gap: 7px;
        color: var(--muted);
        font-size: 12px;
        white-space: nowrap;
      }

      .point-control {
        min-width: 144px;
      }

      .toggle-control {
        min-width: 102px;
      }

      input[type="checkbox"] {
        width: 16px;
        height: 16px;
        margin: 0;
        accent-color: var(--accent);
      }

      input[type="range"] {
        accent-color: var(--accent);
      }

      #pointSize {
        width: 86px;
      }

      button,
      select {
        height: 30px;
        border: 1px solid var(--panel-border);
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.08);
        color: var(--text);
        font: inherit;
        font-size: 12px;
      }

      button {
        min-width: 54px;
        cursor: pointer;
      }

      select {
        min-width: 68px;
        padding: 0 6px;
      }

      button:hover {
        border-color: rgba(131, 211, 197, 0.7);
        background: rgba(131, 211, 197, 0.16);
      }

      button:disabled {
        cursor: default;
        opacity: 0.45;
      }

      .timeline {
        left: 12px;
        right: 12px;
        bottom: 12px;
        display: none;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: 10px;
        min-height: 46px;
        padding: 8px 10px;
      }

      .timeline.active {
        display: grid;
      }

      .ply-panel {
        top: 12px;
        bottom: 12px;
        left: 12px;
        display: none;
        width: var(--sidebar-width);
        padding: 10px;
        flex-direction: column;
        gap: 10px;
      }

      body.multi-mode .ply-panel,
      body.folder-mode .ply-panel {
        display: flex;
      }

      .panel-title {
        color: var(--text);
        font-size: 13px;
        line-height: 18px;
        font-weight: 700;
      }

      .panel-subtitle {
        color: var(--muted);
        font-size: 11px;
        line-height: 15px;
      }

      .ply-list {
        display: flex;
        min-height: 0;
        flex: 1 1 auto;
        flex-direction: column;
        gap: 8px;
        overflow: auto;
        padding-right: 2px;
      }

      .ply-row {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 8px;
        align-items: start;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.06);
        padding: 8px;
      }

      .ply-row.folder-row {
        width: 100%;
        height: auto;
        min-height: 54px;
        grid-template-columns: 1fr;
        color: inherit;
        cursor: pointer;
        font: inherit;
        text-align: left;
      }

      .ply-row.folder-row:hover {
        border-color: rgba(131, 211, 197, 0.52);
        background: rgba(131, 211, 197, 0.12);
      }

      .ply-row.folder-row.active {
        border-color: rgba(131, 211, 197, 0.82);
        background: rgba(131, 211, 197, 0.18);
      }

      .ply-row.loading {
        border-color: rgba(131, 211, 197, 0.45);
      }

      .ply-row.error {
        border-color: rgba(242, 184, 75, 0.65);
      }

      .ply-details {
        min-width: 0;
      }

      .ply-name,
      .ply-path,
      .ply-meta {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .ply-name {
        color: var(--text);
        font-size: 12px;
        line-height: 16px;
        font-weight: 650;
      }

      .ply-path,
      .ply-meta {
        color: var(--muted);
        font-size: 11px;
        line-height: 15px;
      }

      #frameSlider {
        width: 100%;
      }

      .frame-info {
        min-width: 220px;
        color: var(--muted);
        font-size: 12px;
        text-align: right;
        white-space: nowrap;
      }

      .preview {
        right: 12px;
        bottom: 74px;
        display: none;
        width: min(380px, calc(100vw - 24px));
        max-height: 32vh;
        padding: 6px;
      }

      .preview.active {
        display: block;
      }

      .preview img {
        display: block;
        width: 100%;
        max-height: calc(32vh - 12px);
        object-fit: contain;
        border-radius: 6px;
      }

      .error {
        color: var(--warn);
      }

      @media (max-width: 760px) {
        body.multi-mode .ply-panel,
        body.folder-mode .ply-panel {
          top: 12px;
          right: 12px;
          bottom: auto;
          width: auto;
          max-height: 34vh;
        }

        body.multi-mode .topbar,
        body.folder-mode .topbar {
          top: calc(34vh + 24px);
          left: 12px;
        }

        body.multi-mode .timeline,
        body.folder-mode .timeline {
          left: 12px;
        }

        .topbar {
          align-items: stretch;
          flex-direction: column;
        }

        .controls {
          justify-content: space-between;
          width: 100%;
          flex-wrap: wrap;
        }

        .point-control {
          flex: 1 1 160px;
          min-width: 0;
        }

        #pointSize {
          width: 100%;
          max-width: 160px;
        }

        .timeline {
          grid-template-columns: 1fr;
        }

        .sequence-buttons {
          justify-content: space-between;
        }

        .frame-info {
          min-width: 0;
          text-align: left;
          white-space: normal;
        }
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <canvas id="viewer"></canvas>
    <aside id="plyPanel" class="ply-panel">
      <div>
        <div class="panel-title">PLY files</div>
        <div id="plyPanelSubtitle" class="panel-subtitle">Waiting for files</div>
      </div>
      <div id="plyList" class="ply-list"></div>
    </aside>

    <div class="topbar">
      <div class="file">
        <div id="fileName" class="name">PLY Viewer</div>
        <div id="status" class="status">Loading</div>
      </div>
      <div class="controls">
        <label class="toggle-control">
          <input id="showGrid" type="checkbox">
          Grid
        </label>
        <label id="verticesOnlyControl" class="toggle-control" style="visibility: hidden;">
          <input id="verticesOnly" type="checkbox">
          Vertices only
        </label>
        <label id="pointControl" class="point-control" style="visibility: hidden;">
          Point size
          <input id="pointSize" type="range" min="1" max="40" value="8">
          <span id="pointSizeValue">8</span>
        </label>
        <button id="resetView" type="button">Reset</button>
      </div>
    </div>

    <div id="timeline" class="timeline">
      <div class="sequence-buttons">
        <button id="prevFrame" type="button">Prev</button>
        <button id="playPause" type="button">Play</button>
        <button id="nextFrame" type="button">Next</button>
        <label class="fps-control">
          FPS
          <select id="fpsSelect">
            <option value="1">1</option>
            <option value="2" selected>2</option>
            <option value="4">4</option>
            <option value="8">8</option>
          </select>
        </label>
      </div>
      <input id="frameSlider" type="range" min="0" max="0" value="0" step="1">
      <div id="frameInfo" class="frame-info"></div>
    </div>

    <div id="preview" class="preview">
      <img id="previewImage" alt="">
    </div>

    <script type="module">
      import * as THREE from "three";
      import { ArcballControls } from "three/addons/controls/ArcballControls.js";
      import { PLYLoader } from "three/addons/loaders/PLYLoader.js";

      const canvas = document.getElementById("viewer");
      const fileName = document.getElementById("fileName");
      const status = document.getElementById("status");
      const showGrid = document.getElementById("showGrid");
      const verticesOnlyControl = document.getElementById("verticesOnlyControl");
      const verticesOnly = document.getElementById("verticesOnly");
      const pointControl = document.getElementById("pointControl");
      const pointSize = document.getElementById("pointSize");
      const pointSizeValue = document.getElementById("pointSizeValue");
      const resetView = document.getElementById("resetView");
      const timeline = document.getElementById("timeline");
      const prevFrame = document.getElementById("prevFrame");
      const playPause = document.getElementById("playPause");
      const nextFrame = document.getElementById("nextFrame");
      const frameSlider = document.getElementById("frameSlider");
      const frameInfo = document.getElementById("frameInfo");
      const fpsSelect = document.getElementById("fpsSelect");
      const preview = document.getElementById("preview");
      const previewImage = document.getElementById("previewImage");
      const plyPanel = document.getElementById("plyPanel");
      const plyPanelSubtitle = document.getElementById("plyPanelSubtitle");
      const plyList = document.getElementById("plyList");

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x111218);

      const renderer = new THREE.WebGLRenderer({
        antialias: true,
        canvas
      });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.outputColorSpace = THREE.SRGBColorSpace;

      const camera = new THREE.PerspectiveCamera(55, 1, 0.01, 1000);
      const controls = new ArcballControls(camera, renderer.domElement);
      controls.enableAnimations = true;
      controls.enableGizmos = false;
      controls.cursorZoom = true;
      controls.scaleFactor = 1.12;
      controls.rotateSpeed = 1.0;

      scene.add(new THREE.HemisphereLight(0xf4f1e8, 0x30323b, 2.2));

      const keyLight = new THREE.DirectionalLight(0xffffff, 1.8);
      keyLight.position.set(3, 5, 4);
      scene.add(keyLight);

      const fillLight = new THREE.DirectionalLight(0x83d3c5, 0.7);
      fillLight.position.set(-4, 2, -3);
      scene.add(fillLight);

      const modelRoot = new THREE.Group();
      scene.add(modelRoot);

      const grid = new THREE.GridHelper(2, 20, 0x4d5360, 0x2c3038);
      grid.visible = false;
      scene.add(grid);

      let displayObjects = [];
      let meshObject = null;
      let vertexObject = null;
      let lastFrameRadius = null;
      let pointMaterial = null;
      let basePointSize = 0.01;
      let meshStatus = "";
      let verticesStatus = "";
      let mode = "single";
      let folderItems = [];
      let currentFolderIndex = 0;
      let multiItems = new Map();
      let multiPollTimer = null;
      let sequence = null;
      let frames = [];
      let currentFrameIndex = 0;
      let sequenceCenter = null;
      let sequenceFramed = false;
      let isPlaying = false;
      let playTimer = null;
      let loadToken = 0;

      function setStatus(message, isError = false) {
        status.textContent = message;
        status.classList.toggle("error", isError);
      }

      function formatBytes(bytes) {
        if (!Number.isFinite(bytes)) {
          return "";
        }
        const units = ["B", "KB", "MB", "GB", "TB"];
        let value = bytes;
        let unit = 0;
        while (value >= 1024 && unit < units.length - 1) {
          value /= 1024;
          unit += 1;
        }
        return `${value.toFixed(value >= 10 || unit === 0 ? 0 : 1)} ${units[unit]}`;
      }

      function formatLoss(value) {
        return Number.isFinite(value) ? value.toFixed(4) : "-";
      }

      function resize() {
        const width = window.innerWidth;
        const height = window.innerHeight;
        renderer.setSize(width, height, false);
        camera.aspect = width / Math.max(height, 1);
        camera.updateProjectionMatrix();
      }

      function frameObject(radius) {
        const safeRadius = Math.max(radius, 0.001);
        const distance = safeRadius * 2.6;

        camera.near = Math.max(safeRadius / 1000, 0.0001);
        camera.far = Math.max(safeRadius * 1000, 100);
        camera.up.set(0, 1, 0);
        camera.position.set(distance, distance * 0.72, distance);

        controls.target.set(0, 0, 0);
        controls.minDistance = safeRadius * 0.01;
        controls.maxDistance = safeRadius * 80;
        controls.setCamera(camera);
        controls.update();

        grid.scale.setScalar(safeRadius);
        grid.visible = showGrid.checked;
        lastFrameRadius = safeRadius;
      }

      function resetCamera() {
        if (lastFrameRadius) {
          frameObject(lastFrameRadius);
        }
      }

      function updatePointSize() {
        pointSizeValue.textContent = pointSize.value;
        if (pointMaterial) {
          pointMaterial.size = basePointSize * Number(pointSize.value);
        }
        for (const item of multiItems.values()) {
          if (item.pointMaterial) {
            item.pointMaterial.size = item.basePointSize * Number(pointSize.value);
          }
        }
      }

      function updateGridVisibility() {
        grid.visible = showGrid.checked;
      }

      function disposeDisplayObjects() {
        const disposedGeometries = new Set();
        const disposedMaterials = new Set();

        for (const object of displayObjects) {
          scene.remove(object);
          if (object.geometry && !disposedGeometries.has(object.geometry)) {
            object.geometry.dispose();
            disposedGeometries.add(object.geometry);
          }
          if (object.material && !disposedMaterials.has(object.material)) {
            object.material.dispose();
            disposedMaterials.add(object.material);
          }
        }

        displayObjects = [];
        meshObject = null;
        vertexObject = null;
        pointMaterial = null;
      }

      function updateDisplayMode() {
        if (mode === "multi") {
          updateMultiVisibility();
          return;
        }

        if (!meshObject || !vertexObject) {
          verticesOnlyControl.style.visibility = "hidden";
          pointControl.style.visibility = pointMaterial ? "visible" : "hidden";
          return;
        }

        const showVertices = verticesOnly.checked;
        meshObject.visible = !showVertices;
        vertexObject.visible = showVertices;
        pointControl.style.visibility = showVertices ? "visible" : "hidden";
        verticesOnlyControl.style.visibility = "visible";
        setStatus(showVertices ? verticesStatus : meshStatus);
      }

      function installGeometry(geometry, options = {}) {
        if (!geometry.hasAttribute("position")) {
          throw new Error("PLY file has no vertex positions");
        }

        geometry.computeBoundingBox();
        const box = geometry.boundingBox;
        const center = new THREE.Vector3();
        const size = new THREE.Vector3();
        box.getCenter(center);
        box.getSize(size);

        const stableCenter = options.stableCenter || center;
        geometry.translate(-stableCenter.x, -stableCenter.y, -stableCenter.z);
        geometry.computeBoundingSphere();

        const radius = geometry.boundingSphere ? geometry.boundingSphere.radius : Math.max(size.x, size.y, size.z, 1);
        if (options.onGeometryInfo) {
          options.onGeometryInfo(center.clone(), radius);
        }
        const hasFaces = Boolean(geometry.index && geometry.index.count > 0);
        const hasColors = geometry.hasAttribute("color");

        disposeDisplayObjects();

        if (hasFaces) {
          geometry.computeVertexNormals();
          const meshMaterial = new THREE.MeshStandardMaterial({
            color: hasColors ? 0xffffff : 0xd8dde5,
            metalness: 0.0,
            roughness: 0.82,
            side: THREE.DoubleSide,
            vertexColors: hasColors
          });

          const vertexGeometry = geometry.clone();
          vertexGeometry.setIndex(null);
          basePointSize = Math.max(radius / 850, 0.0005);
          pointMaterial = new THREE.PointsMaterial({
            color: hasColors ? 0xffffff : 0xd8dde5,
            size: basePointSize * Number(pointSize.value),
            sizeAttenuation: true,
            vertexColors: hasColors
          });

          meshObject = new THREE.Mesh(geometry, meshMaterial);
          vertexObject = new THREE.Points(vertexGeometry, pointMaterial);
          vertexObject.visible = false;
          displayObjects = [meshObject, vertexObject];
          scene.add(meshObject);
          scene.add(vertexObject);

          meshStatus = `${geometry.attributes.position.count.toLocaleString()} vertices, mesh`;
          verticesStatus = `${geometry.attributes.position.count.toLocaleString()} vertices only`;
          verticesOnly.checked = false;
          updateDisplayMode();
        } else {
          basePointSize = Math.max(radius / 850, 0.0005);
          pointMaterial = new THREE.PointsMaterial({
            color: hasColors ? 0xffffff : 0xd8dde5,
            size: basePointSize * Number(pointSize.value),
            sizeAttenuation: true,
            vertexColors: hasColors
          });
          const pointObject = new THREE.Points(geometry, pointMaterial);
          displayObjects = [pointObject];
          scene.add(pointObject);
          meshStatus = "";
          verticesStatus = "";
          verticesOnly.checked = false;
          verticesOnlyControl.style.visibility = "hidden";
          pointControl.style.visibility = "visible";
          setStatus(`${geometry.attributes.position.count.toLocaleString()} points`);
        }

        if (options.frameCamera) {
          frameObject(radius);
        } else {
          lastFrameRadius = Math.max(lastFrameRadius || 0, radius);
          grid.scale.setScalar(lastFrameRadius);
          grid.visible = showGrid.checked;
        }
      }

      function loadGeometry(url, options = {}) {
        const token = ++loadToken;
        const loader = new PLYLoader();
        const suffix = url.includes("?") ? "&" : "?";
        loader.load(
          `${url}${suffix}t=${Date.now()}`,
          (geometry) => {
            if (token !== loadToken) {
              geometry.dispose();
              return;
            }
            try {
              installGeometry(geometry, options);
              if (options.onLoaded) {
                options.onLoaded();
              }
            } catch (error) {
              console.error(error);
              setStatus(error.message || "Failed to display PLY", true);
            }
          },
          (event) => {
            if (event.lengthComputable && event.total > 0) {
              const percent = Math.round((event.loaded / event.total) * 100);
              setStatus(`Loading ${percent}%`);
            }
          },
          (error) => {
            console.error(error);
            setStatus("Failed to load PLY", true);
          }
        );
      }

      async function loadMeta() {
        const response = await fetch("/meta.json", { cache: "no-store" });
        if (!response.ok) {
          throw new Error("Failed to load metadata");
        }
        return response.json();
      }

      async function loadSingle(meta) {
        const displayName = meta.name || meta.file_name || "PLY Viewer";
        document.title = `${displayName} - PLY Viewer`;
        fileName.textContent = displayName;
        const size = formatBytes(meta.size);
        if (size) {
          const fileLabel = meta.file_name && meta.file_name !== displayName ? `${meta.file_name}, ` : "";
          setStatus(`Loading ${fileLabel}${size}`);
        }
        loadGeometry("/model.ply", { frameCamera: true });
      }

      function renderFolderList() {
        plyPanelSubtitle.textContent = `${folderItems.length} file${folderItems.length === 1 ? "" : "s"}`;
        plyList.replaceChildren();

        if (!folderItems.length) {
          const empty = document.createElement("div");
          empty.className = "panel-subtitle";
          empty.textContent = "No PLY files";
          plyList.appendChild(empty);
          return;
        }

        for (const [index, item] of folderItems.entries()) {
          const row = document.createElement("button");
          row.type = "button";
          row.className = "ply-row folder-row";
          row.classList.toggle("active", index === currentFolderIndex);
          row.addEventListener("click", () => loadFolderItem(index, false));

          const details = document.createElement("div");
          details.className = "ply-details";

          const name = document.createElement("div");
          name.className = "ply-name";
          name.textContent = item.name || `PLY ${index + 1}`;

          const path = document.createElement("div");
          path.className = "ply-path";
          path.title = item.path || "";
          path.textContent = item.path || "";

          const meta = document.createElement("div");
          meta.className = "ply-meta";
          meta.textContent = formatBytes(Number(item.size));

          details.append(name, path, meta);
          row.append(details);
          plyList.appendChild(row);
        }
      }

      function loadFolderItem(index, frameCamera = true) {
        if (mode !== "folder" || !folderItems.length) {
          return;
        }

        currentFolderIndex = (index + folderItems.length) % folderItems.length;
        const item = folderItems[currentFolderIndex];
        renderFolderList();
        const active = plyList.querySelector(".folder-row.active");
        if (active) {
          active.scrollIntoView({ block: "nearest" });
        }

        const size = formatBytes(Number(item.size));
        setStatus(`${currentFolderIndex + 1} / ${folderItems.length}  ${item.name}${size ? `, ${size}` : ""}`);
        loadGeometry(item.url, {
          frameCamera,
          onLoaded: () => {
            setStatus(`${currentFolderIndex + 1} / ${folderItems.length}  ${item.name}`);
          }
        });
      }

      async function loadFolder(meta) {
        mode = "folder";
        document.body.classList.add("folder-mode");
        plyPanel.setAttribute("aria-hidden", "false");

        const displayName = meta.name || "PLY Folder";
        document.title = `${displayName} - PLY Viewer`;
        fileName.textContent = displayName;

        folderItems = Array.isArray(meta.files) ? meta.files : [];
        currentFolderIndex = 0;
        renderFolderList();
        if (!folderItems.length) {
          throw new Error("No PLY files found");
        }
        loadFolderItem(0, true);
      }

      async function fetchPlyFiles() {
        const response = await fetch("/api/ply-files", { cache: "no-store" });
        if (!response.ok) {
          throw new Error("Failed to load PLY files");
        }
        return response.json();
      }

      function renderPlyList() {
        const items = Array.from(multiItems.values());
        plyPanelSubtitle.textContent = `${items.length} file${items.length === 1 ? "" : "s"}`;
        plyList.replaceChildren();

        if (!items.length) {
          const empty = document.createElement("div");
          empty.className = "panel-subtitle";
          empty.textContent = "No PLY files";
          plyList.appendChild(empty);
          return;
        }

        for (const item of items) {
          const row = document.createElement("label");
          row.className = "ply-row";
          if (item.loading) {
            row.classList.add("loading");
          }
          if (item.error) {
            row.classList.add("error");
          }

          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.checked = item.visible;
          checkbox.addEventListener("change", () => {
            item.visible = checkbox.checked;
            updateMultiVisibility(false);
            renderPlyList();
          });

          const details = document.createElement("div");
          details.className = "ply-details";

          const name = document.createElement("div");
          name.className = "ply-name";
          name.textContent = item.name || item.id;

          const path = document.createElement("div");
          path.className = "ply-path";
          path.title = item.path || "";
          path.textContent = item.path || "";

          const meta = document.createElement("div");
          meta.className = "ply-meta";
          meta.textContent = multiItemStatus(item);

          details.append(name, path, meta);
          row.append(checkbox, details);
          plyList.appendChild(row);
        }
      }

      function multiItemStatus(item) {
        const size = formatBytes(item.size);
        if (item.error) {
          return item.error;
        }
        if (item.loading) {
          const progress = Number.isFinite(item.progress) ? ` ${item.progress}%` : "";
          return `loading${progress}${size ? `, ${size}` : ""}`;
        }
        if (item.loaded) {
          const kind = item.hasMesh ? "mesh" : "points";
          const count = Number.isFinite(item.vertexCount) ? `${item.vertexCount.toLocaleString()} vertices` : "loaded";
          return `${count}, ${kind}${size ? `, ${size}` : ""}`;
        }
        return `queued${size ? `, ${size}` : ""}`;
      }

      function syncPlyFiles(payload) {
        const files = Array.isArray(payload.files) ? payload.files : [];
        for (const file of files) {
          if (!file || !file.id || !file.url) {
            continue;
          }

          let item = multiItems.get(file.id);
          if (!item) {
            item = {
              id: file.id,
              name: file.name || file.id,
              path: file.path || "",
              size: Number(file.size),
              url: file.url,
              visible: true,
              loading: false,
              loaded: false,
              error: "",
              objects: []
            };
            multiItems.set(file.id, item);
            loadMultiItem(item);
          } else {
            item.name = file.name || item.name;
            item.path = file.path || item.path;
            item.size = Number(file.size);
            item.url = file.url || item.url;
          }
        }
        renderPlyList();
      }

      function loadMultiItem(item) {
        if (item.loading || item.loaded) {
          return;
        }

        item.loading = true;
        item.error = "";
        renderPlyList();

        const loader = new PLYLoader();
        const suffix = item.url.includes("?") ? "&" : "?";
        loader.load(
          `${item.url}${suffix}t=${Date.now()}`,
          (geometry) => {
            try {
              installMultiGeometry(item, geometry);
            } catch (error) {
              console.error(error);
              geometry.dispose();
              item.loading = false;
              item.error = error.message || "Failed to display PLY";
              renderPlyList();
              updateMultiVisibility(false);
              setStatus(item.error, true);
            }
          },
          (event) => {
            if (event.lengthComputable && event.total > 0) {
              item.progress = Math.round((event.loaded / event.total) * 100);
              setStatus(`Loading ${item.name} ${item.progress}%`);
              renderPlyList();
            }
          },
          (error) => {
            console.error(error);
            item.loading = false;
            item.error = "Failed to load PLY";
            renderPlyList();
            updateMultiVisibility(false);
            setStatus(item.error, true);
          }
        );
      }

      function installMultiGeometry(item, geometry) {
        if (!geometry.hasAttribute("position")) {
          throw new Error("PLY file has no vertex positions");
        }

        geometry.computeBoundingBox();
        geometry.computeBoundingSphere();
        const box = geometry.boundingBox.clone();
        const size = new THREE.Vector3();
        box.getSize(size);
        const radius = geometry.boundingSphere ? geometry.boundingSphere.radius : Math.max(size.x, size.y, size.z, 1);
        const hasFaces = Boolean(geometry.index && geometry.index.count > 0);
        const hasColors = geometry.hasAttribute("color");
        const vertexCount = geometry.attributes.position.count;
        const objects = [];

        if (hasFaces) {
          geometry.computeVertexNormals();
          const meshMaterial = new THREE.MeshStandardMaterial({
            color: hasColors ? 0xffffff : 0xd8dde5,
            metalness: 0.0,
            roughness: 0.82,
            side: THREE.DoubleSide,
            vertexColors: hasColors
          });
          const mesh = new THREE.Mesh(geometry, meshMaterial);

          const vertexGeometry = geometry.clone();
          vertexGeometry.setIndex(null);
          const itemBasePointSize = Math.max(radius / 850, 0.0005);
          const itemPointMaterial = new THREE.PointsMaterial({
            color: hasColors ? 0xffffff : 0xd8dde5,
            size: itemBasePointSize * Number(pointSize.value),
            sizeAttenuation: true,
            vertexColors: hasColors
          });
          const points = new THREE.Points(vertexGeometry, itemPointMaterial);

          item.mesh = mesh;
          item.points = points;
          item.pointMaterial = itemPointMaterial;
          item.basePointSize = itemBasePointSize;
          item.hasMesh = true;
          objects.push(mesh, points);
        } else {
          const itemBasePointSize = Math.max(radius / 850, 0.0005);
          const itemPointMaterial = new THREE.PointsMaterial({
            color: hasColors ? 0xffffff : 0xd8dde5,
            size: itemBasePointSize * Number(pointSize.value),
            sizeAttenuation: true,
            vertexColors: hasColors
          });
          const points = new THREE.Points(geometry, itemPointMaterial);

          item.points = points;
          item.pointMaterial = itemPointMaterial;
          item.basePointSize = itemBasePointSize;
          item.hasMesh = false;
          objects.push(points);
        }

        for (const object of objects) {
          modelRoot.add(object);
        }

        item.objects = objects;
        item.box = box;
        item.radius = radius;
        item.vertexCount = vertexCount;
        item.loading = false;
        item.loaded = true;
        item.progress = null;
        item.error = "";
        updateMultiVisibility(true);
        renderPlyList();
      }

      function updateMultiVisibility(frameCamera = false) {
        if (mode !== "multi") {
          return;
        }

        const showVertices = verticesOnly.checked;
        let loaded = 0;
        let loading = 0;
        let visibleLoaded = 0;
        let errors = 0;
        let hasMesh = false;
        let hasPointCloud = false;

        for (const item of multiItems.values()) {
          if (item.loading) {
            loading += 1;
          }
          if (item.error) {
            errors += 1;
          }
          if (!item.loaded) {
            continue;
          }

          loaded += 1;
          hasMesh = hasMesh || Boolean(item.hasMesh);
          hasPointCloud = hasPointCloud || !item.hasMesh;
          if (item.visible) {
            visibleLoaded += 1;
          }

          if (item.mesh && item.points) {
            item.mesh.visible = item.visible && !showVertices;
            item.points.visible = item.visible && showVertices;
          } else if (item.points) {
            item.points.visible = item.visible;
          }
        }

        verticesOnlyControl.style.visibility = hasMesh ? "visible" : "hidden";
        pointControl.style.visibility = loaded && (showVertices || hasPointCloud) ? "visible" : "hidden";
        frameMultiVisible(frameCamera);

        const parts = [];
        if (loaded) {
          parts.push(`${visibleLoaded}/${loaded} visible`);
        }
        if (loading) {
          parts.push(`${loading} loading`);
        }
        if (errors) {
          parts.push(`${errors} failed`);
        }
        if (!parts.length) {
          parts.push(`${multiItems.size} queued`);
        }
        setStatus(parts.join(", "), errors > 0);
      }

      function frameMultiVisible(frameCamera = false) {
        const combined = new THREE.Box3();
        let hasVisible = false;

        for (const item of multiItems.values()) {
          if (!item.loaded || !item.visible || !item.box) {
            continue;
          }
          combined.union(item.box);
          hasVisible = true;
        }

        if (!hasVisible) {
          modelRoot.position.set(0, 0, 0);
          return;
        }

        const center = new THREE.Vector3();
        const size = new THREE.Vector3();
        combined.getCenter(center);
        combined.getSize(size);
        modelRoot.position.set(-center.x, -center.y, -center.z);

        const radius = Math.max(size.length() / 2, 0.001);
        if (frameCamera) {
          frameObject(radius);
        } else {
          lastFrameRadius = radius;
          grid.scale.setScalar(radius);
          grid.visible = showGrid.checked;
        }
      }

      async function refreshMultiFiles() {
        if (mode !== "multi") {
          return;
        }
        try {
          const payload = await fetchPlyFiles();
          syncPlyFiles(payload);
          updateMultiVisibility(false);
        } catch (error) {
          console.error(error);
          setStatus(error.message || "Failed to refresh PLY files", true);
        }
      }

      async function loadMulti(meta) {
        mode = "multi";
        document.body.classList.add("multi-mode");
        plyPanel.setAttribute("aria-hidden", "false");
        const displayName = meta.name || meta.file_name || "PLY Viewer";
        document.title = `${displayName} - PLY Viewer`;
        fileName.textContent = displayName;
        setStatus("Loading PLY files");

        await refreshMultiFiles();
        multiPollTimer = setInterval(refreshMultiFiles, 1000);
      }

      async function fetchSequence() {
        const response = await fetch("/sequence.json", { cache: "no-store" });
        if (!response.ok) {
          throw new Error("Failed to load sequence");
        }
        return response.json();
      }

      function frameLabel(frame) {
        if (frame.label) {
          return frame.label;
        }
        return Number.isFinite(frame.iter) ? String(frame.iter) : "-";
      }

      function updateSequenceControls() {
        const hasFrames = frames.length > 0;
        frameSlider.max = Math.max(frames.length - 1, 0);
        frameSlider.value = Math.min(currentFrameIndex, Math.max(frames.length - 1, 0));
        prevFrame.disabled = !hasFrames || currentFrameIndex <= 0;
        nextFrame.disabled = !hasFrames || currentFrameIndex >= frames.length - 1;
        playPause.disabled = frames.length < 2;
        playPause.textContent = isPlaying ? "Pause" : "Play";

        if (!hasFrames) {
          frameInfo.textContent = "No frames";
          return;
        }

        const frame = frames[currentFrameIndex];
        const parts = [
          `Frame ${currentFrameIndex + 1}/${frames.length}`,
          `Iter ${frameLabel(frame)}`
        ];
        if (Number.isFinite(frame.plane_count)) {
          parts.push(`${Number(frame.plane_count).toLocaleString()} planes`);
        }
        if (frame.loss_total !== null && frame.loss_total !== undefined) {
          parts.push(`Loss ${formatLoss(Number(frame.loss_total))}`);
        }
        frameInfo.textContent = parts.join(" | ");
      }

      function updatePreview(frame) {
        if (frame && frame.preview_url) {
          previewImage.src = `${frame.preview_url}?t=${Date.now()}`;
          preview.classList.add("active");
        } else {
          previewImage.removeAttribute("src");
          preview.classList.remove("active");
        }
      }

      function setSequenceFrames(payload) {
        sequence = payload;
        frames = Array.isArray(payload.frames) ? payload.frames : [];
        frames.sort((a, b) => Number(a.iter || 0) - Number(b.iter || 0));
        currentFrameIndex = Math.min(currentFrameIndex, Math.max(frames.length - 1, 0));
        updateSequenceControls();
      }

      function loadSequenceFrame(index, frameCamera = false) {
        if (!frames.length) {
          return;
        }
        currentFrameIndex = Math.max(0, Math.min(index, frames.length - 1));
        const frame = frames[currentFrameIndex];
        updateSequenceControls();
        updatePreview(frame);

        const size = formatBytes(frame.primitive_size);
        const count = Number.isFinite(frame.plane_count) ? `${Number(frame.plane_count).toLocaleString()} planes, ` : "";
        setStatus(`Loading iter ${frameLabel(frame)}${size ? `, ${count}${size}` : ""}`);

        const options = {
          frameCamera: frameCamera || !sequenceFramed,
          stableCenter: sequenceCenter,
          onGeometryInfo: (center) => {
            if (!sequenceCenter) {
              sequenceCenter = center;
            }
          },
          onLoaded: () => {
            sequenceFramed = true;
            updateSequenceControls();
          }
        };

        loadGeometry(frame.primitive_url, options);
      }

      function playNextFrame() {
        if (!isPlaying || frames.length < 2) {
          return;
        }
        const next = currentFrameIndex >= frames.length - 1 ? 0 : currentFrameIndex + 1;
        loadSequenceFrame(next, false);
      }

      function updatePlayTimer() {
        if (playTimer) {
          clearInterval(playTimer);
          playTimer = null;
        }
        if (isPlaying) {
          const interval = 1000 / Math.max(Number(fpsSelect.value), 1);
          playTimer = setInterval(playNextFrame, interval);
        }
      }

      async function refreshSequence() {
        if (mode !== "sequence") {
          return;
        }
        try {
          const payload = await fetchSequence();
          const oldLength = frames.length;
          setSequenceFrames(payload);
          if (frames.length && oldLength === 0) {
            loadSequenceFrame(0, true);
          }
          const statusBits = [];
          if (payload.status) {
            statusBits.push(payload.status);
          }
          statusBits.push(`${frames.length} frames`);
          setStatus(statusBits.join(", "));
        } catch (error) {
          console.error(error);
          setStatus(error.message || "Failed to refresh sequence", true);
        }
      }

      async function loadSequence(meta) {
        mode = "sequence";
        timeline.classList.add("active");
        const displayName = meta.name || "PLY Sequence";
        document.title = `${displayName} - PLY Viewer`;
        fileName.textContent = displayName;
        setStatus("Loading sequence");

        await refreshSequence();
        if (frames.length) {
          loadSequenceFrame(0, true);
        }
        setInterval(() => {
          if (sequence && sequence.status === "running") {
            refreshSequence();
          }
        }, 2000);
      }

      async function start() {
        try {
          const meta = await loadMeta();
          if (meta.mode === "sequence") {
            await loadSequence(meta);
          } else if (meta.mode === "folder") {
            await loadFolder(meta);
          } else if (meta.mode === "multi") {
            await loadMulti(meta);
          } else {
            await loadSingle(meta);
          }
        } catch (error) {
          console.error(error);
          setStatus(error.message || "Failed to initialize viewer", true);
        }
      }

      showGrid.addEventListener("change", updateGridVisibility);
      verticesOnly.addEventListener("change", updateDisplayMode);
      pointSize.addEventListener("input", updatePointSize);
      resetView.addEventListener("click", resetCamera);
      prevFrame.addEventListener("click", () => loadSequenceFrame(currentFrameIndex - 1, false));
      nextFrame.addEventListener("click", () => loadSequenceFrame(currentFrameIndex + 1, false));
      frameSlider.addEventListener("input", () => loadSequenceFrame(Number(frameSlider.value), false));
      fpsSelect.addEventListener("change", updatePlayTimer);
      playPause.addEventListener("click", () => {
        isPlaying = !isPlaying;
        updateSequenceControls();
        updatePlayTimer();
      });
      document.addEventListener("keydown", (event) => {
        if (mode !== "folder") {
          return;
        }
        const target = event.target;
        const tagName = target && target.tagName ? target.tagName.toLowerCase() : "";
        if (tagName === "input" || tagName === "select" || tagName === "textarea") {
          return;
        }
        if (event.key === "ArrowLeft") {
          event.preventDefault();
          loadFolderItem(currentFolderIndex - 1, false);
        } else if (event.key === "ArrowRight") {
          event.preventDefault();
          loadFolderItem(currentFolderIndex + 1, false);
        }
      });
      window.addEventListener("resize", resize);

      resize();
      updatePointSize();
      updateGridVisibility();
      start();

      function animate() {
        controls.update();
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      }

      animate();
    </script>
  </body>
</html>
