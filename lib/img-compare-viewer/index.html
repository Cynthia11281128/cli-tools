<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Image Compare Viewer</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #101114;
        --panel: #181a20;
        --panel-2: #20232b;
        --line: #333844;
        --text: #f3f5f8;
        --muted: #a4adbb;
        --accent: #75c7b7;
        --danger: #ff8a8a;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      .app {
        display: grid;
        grid-template-columns: minmax(180px, 240px) minmax(280px, 1fr) minmax(280px, 1fr) minmax(180px, 240px);
        width: 100vw;
        height: 100vh;
        min-width: 0;
        min-height: 0;
      }

      .panel {
        display: flex;
        min-width: 0;
        min-height: 0;
        flex-direction: column;
        background: var(--panel);
      }

      .panel.left {
        border-right: 1px solid var(--line);
      }

      .panel.right {
        border-left: 1px solid var(--line);
      }

      .panel-header {
        display: flex;
        min-height: 66px;
        flex-direction: column;
        justify-content: center;
        gap: 3px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
      }

      .title {
        overflow: hidden;
        color: var(--text);
        font-size: 14px;
        font-weight: 650;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .count,
      .path {
        overflow: hidden;
        color: var(--muted);
        font-size: 12px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .image-list {
        min-height: 0;
        overflow: auto;
        padding: 6px;
      }

      .image-item {
        display: block;
        width: 100%;
        min-height: 34px;
        margin: 0;
        padding: 7px 8px;
        border: 0;
        border-radius: 6px;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        font: inherit;
        font-size: 12px;
        line-height: 1.25;
        overflow-wrap: anywhere;
        text-align: left;
      }

      .image-item:hover {
        background: var(--panel-2);
        color: var(--text);
      }

      .image-item.active {
        background: rgba(117, 199, 183, 0.16);
        color: var(--text);
        outline: 1px solid rgba(117, 199, 183, 0.42);
      }

      .viewer {
        display: grid;
        min-width: 0;
        min-height: 0;
        grid-template-rows: auto minmax(0, 1fr);
        border-right: 1px solid var(--line);
      }

      .viewer.right-viewer {
        border-right: 0;
      }

      .topbar {
        display: flex;
        min-height: 66px;
        flex-direction: column;
        justify-content: center;
        gap: 3px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
        background: rgba(16, 17, 20, 0.96);
      }

      .status {
        overflow: hidden;
        color: var(--text);
        font-size: 14px;
        font-weight: 620;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .hint {
        overflow: hidden;
        color: var(--muted);
        font-size: 12px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .stage {
        position: relative;
        min-width: 0;
        min-height: 0;
        background:
          linear-gradient(45deg, #15171c 25%, transparent 25%),
          linear-gradient(-45deg, #15171c 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, #15171c 75%),
          linear-gradient(-45deg, transparent 75%, #15171c 75%);
        background-color: #0d0e11;
        background-position:
          0 0,
          0 10px,
          10px -10px,
          -10px 0;
        background-size: 20px 20px;
      }

      .image {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .error {
        display: none;
        padding: 24px;
        color: var(--danger);
        font-size: 14px;
      }

      .failed .stage,
      .failed .panel {
        display: none;
      }

      .failed .error {
        display: block;
      }

      @media (max-width: 980px) {
        body {
          overflow: auto;
        }

        .app {
          grid-template-columns: minmax(160px, 34vw) minmax(360px, 1fr) minmax(360px, 1fr) minmax(160px, 34vw);
          min-width: 1040px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app" class="app">
      <aside class="panel left" aria-label="Left images">
        <div class="panel-header">
          <div id="leftTitle" class="title">Left</div>
          <div id="leftCount" class="count"></div>
          <div id="leftPath" class="path"></div>
        </div>
        <div id="leftList" class="image-list"></div>
      </aside>

      <main class="viewer left-viewer">
        <header class="topbar">
          <div id="leftStatus" class="status">Loading...</div>
          <div class="hint">A / D</div>
        </header>
        <section class="stage" aria-label="Left image preview">
          <img id="leftImage" class="image" alt="" />
        </section>
      </main>

      <main class="viewer right-viewer">
        <header class="topbar">
          <div id="rightStatus" class="status">Loading...</div>
          <div class="hint">ArrowLeft / ArrowRight</div>
        </header>
        <section class="stage" aria-label="Right image preview">
          <img id="rightImage" class="image" alt="" />
        </section>
      </main>

      <aside class="panel right" aria-label="Right images">
        <div class="panel-header">
          <div id="rightTitle" class="title">Right</div>
          <div id="rightCount" class="count"></div>
          <div id="rightPath" class="path"></div>
        </div>
        <div id="rightList" class="image-list"></div>
      </aside>

      <div id="error" class="error"></div>
    </div>

    <script>
      const app = document.getElementById("app");
      const error = document.getElementById("error");

      const sides = {
        left: {
          title: document.getElementById("leftTitle"),
          count: document.getElementById("leftCount"),
          path: document.getElementById("leftPath"),
          list: document.getElementById("leftList"),
          status: document.getElementById("leftStatus"),
          image: document.getElementById("leftImage"),
          images: [],
          currentIndex: 0
        },
        right: {
          title: document.getElementById("rightTitle"),
          count: document.getElementById("rightCount"),
          path: document.getElementById("rightPath"),
          list: document.getElementById("rightList"),
          status: document.getElementById("rightStatus"),
          image: document.getElementById("rightImage"),
          images: [],
          currentIndex: 0
        }
      };

      function setError(message) {
        app.classList.add("failed");
        error.textContent = message;
        sides.left.status.textContent = "Failed";
        sides.right.status.textContent = "Failed";
      }

      function setCurrent(sideName, index) {
        const side = sides[sideName];
        if (!side.images.length) {
          return;
        }

        side.currentIndex = (index + side.images.length) % side.images.length;
        const item = side.images[side.currentIndex];
        side.image.src = item.url;
        side.image.alt = item.name;
        side.status.textContent = `${side.currentIndex + 1} / ${side.images.length}  ${item.name}`;

        for (const button of side.list.querySelectorAll(".image-item")) {
          button.classList.toggle("active", Number(button.dataset.index) === side.currentIndex);
        }
        const active = side.list.querySelector(".image-item.active");
        if (active) {
          active.scrollIntoView({ block: "nearest" });
        }
      }

      function renderList(sideName) {
        const side = sides[sideName];
        side.list.textContent = "";
        for (const [index, item] of side.images.entries()) {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "image-item";
          button.dataset.index = String(index);
          button.textContent = item.name;
          button.addEventListener("click", () => setCurrent(sideName, index));
          side.list.appendChild(button);
        }
      }

      function installSide(sideName, payload) {
        const side = sides[sideName];
        side.images = payload.images || [];
        side.title.textContent = sideName === "left" ? `Left: ${payload.name || "Images"}` : `Right: ${payload.name || "Images"}`;
        side.count.textContent = `${side.images.length} images`;
        side.path.textContent = payload.path || "";
        renderList(sideName);

        if (!side.images.length) {
          throw new Error(`${sideName} folder has no images`);
        }
        setCurrent(sideName, 0);
      }

      function shouldIgnoreKey(event) {
        const tagName = event.target && event.target.tagName;
        return tagName === "INPUT" || tagName === "TEXTAREA" || tagName === "SELECT" || event.target?.isContentEditable;
      }

      document.addEventListener("keydown", (event) => {
        if (shouldIgnoreKey(event)) {
          return;
        }

        if (event.key === "a" || event.key === "A") {
          event.preventDefault();
          setCurrent("left", sides.left.currentIndex - 1);
        } else if (event.key === "d" || event.key === "D") {
          event.preventDefault();
          setCurrent("left", sides.left.currentIndex + 1);
        } else if (event.key === "ArrowLeft") {
          event.preventDefault();
          setCurrent("right", sides.right.currentIndex - 1);
        } else if (event.key === "ArrowRight") {
          event.preventDefault();
          setCurrent("right", sides.right.currentIndex + 1);
        }
      });

      sides.left.image.addEventListener("error", () => {
        setError(`Could not display left image: ${sides.left.images[sides.left.currentIndex]?.name || "unknown"}`);
      });
      sides.right.image.addEventListener("error", () => {
        setError(`Could not display right image: ${sides.right.images[sides.right.currentIndex]?.name || "unknown"}`);
      });

      async function main() {
        const response = await fetch("/meta.json", { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const meta = await response.json();
        document.title = `${meta.name || "Image Compare"} - Image Compare Viewer`;
        installSide("left", meta.left || {});
        installSide("right", meta.right || {});
      }

      main().catch((err) => {
        setError(err && err.message ? err.message : "Unknown error");
      });
    </script>
  </body>
</html>
